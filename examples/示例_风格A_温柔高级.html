<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>示例 · 风格A 温柔高级</title>
<style>body{margin:0;background:#eceae6;-webkit-font-smoothing:antialiased;}.wrap{max-width:420px;margin:18px auto;background:#fff;padding:18px 16px;border-radius:12px;box-shadow:0 2px 16px rgba(0,0,0,.06);}</style>
</head>
<body>
<div class="wrap">
<section style="max-width:100%;padding:0 4px;font-size:15px;color:#4A4A4A;">

<section style="text-align:center;font-size:13px;color:#9B9B9B;letter-spacing:1px;margin-bottom:20px;">点击上方蓝字 · 关注「沫凡的小屋」</section>

<section style="margin:8px 0 24px;text-align:center;">
  <p style="font-family:'Songti SC','STSong',serif;font-size:22px;font-weight:bold;color:#4A4A4A;letter-spacing:1px;line-height:1.5;margin:0;">30岁以后，我把"对自己好"<br>写进了日程表</p>
  <p style="font-size:13px;color:#9B9B9B;letter-spacing:2px;margin:12px 0 0;">温柔，是给自己留的余地</p>
  <section style="width:36px;height:2px;background:#D9A6A0;margin:16px auto 0;"></section>
</section>

<p style="font-size:15px;color:#4A4A4A;line-height:1.8;letter-spacing:0.5px;margin:0 0 1.2em;">以前我总觉得，对自己好是"有空了再做"的事。直到那年体检报告出来，我才明白——<span style="color:#A67C52;font-weight:bold;background:linear-gradient(transparent 60%,#FBF0EC 60%);">照顾自己不是奖励，是底线。</span></p>

<section style="margin:32px 0 14px;display:flex;align-items:center;">
  <span style="display:inline-block;background:#A67C52;color:#fff;font-size:13px;padding:2px 9px;border-radius:3px;margin-right:9px;">01</span>
  <span style="font-family:'Songti SC','STSong',serif;font-size:18px;font-weight:bold;color:#4A4A4A;letter-spacing:0.5px;">把休息当成任务来排</span>
</section>
<p style="font-size:15px;color:#4A4A4A;line-height:1.8;letter-spacing:0.5px;margin:0 0 1.2em;">我开始在日历里给自己排"空白时间"，像对待会议一样认真。不是有空才休息，而是先占住，再安排别的。</p>

<section style="background:#FBF7F2;border-radius:8px;padding:24px 20px;margin:24px 0;text-align:center;">
  <p style="font-size:17px;color:#A67C52;font-weight:bold;line-height:1.7;letter-spacing:1px;margin:0;">你不是机器，<br>不需要永远高效。</p>
</section>

<section style="margin:32px 0 14px;display:flex;align-items:center;">
  <span style="display:inline-block;background:#A67C52;color:#fff;font-size:13px;padding:2px 9px;border-radius:3px;margin-right:9px;">02</span>
  <span style="font-family:'Songti SC','STSong',serif;font-size:18px;font-weight:bold;color:#4A4A4A;letter-spacing:0.5px;">三件小事，立刻能做</span>
</section>
<section style="margin:20px 0;">
  <section style="display:flex;margin-bottom:12px;"><span style="flex-shrink:0;width:20px;height:20px;background:#D9A6A0;color:#fff;border-radius:50%;text-align:center;line-height:20px;font-size:12px;margin-right:10px;">1</span><span style="font-size:15px;color:#4A4A4A;line-height:1.6;">睡前半小时不看手机</span></section>
  <section style="display:flex;margin-bottom:12px;"><span style="flex-shrink:0;width:20px;height:20px;background:#D9A6A0;color:#fff;border-radius:50%;text-align:center;line-height:20px;font-size:12px;margin-right:10px;">2</span><span style="font-size:15px;color:#4A4A4A;line-height:1.6;">每周留一顿好好吃的饭</span></section>
  <section style="display:flex;"><span style="flex-shrink:0;width:20px;height:20px;background:#D9A6A0;color:#fff;border-radius:50%;text-align:center;line-height:20px;font-size:12px;margin-right:10px;">3</span><span style="font-size:15px;color:#4A4A4A;line-height:1.6;">把"应该"换成"我想"</span></section>
</section>

<section style="text-align:center;color:#E5DACE;font-size:14px;letter-spacing:6px;margin:28px 0;">· · ·</section>

<section style="background:linear-gradient(135deg,#FBF7F2,#FBF0EC);border-radius:8px;padding:22px 20px;margin:30px 0 20px;text-align:center;">
  <p style="font-size:15px;color:#A67C52;font-weight:bold;margin:0 0 8px;">想和我一起慢下来？</p>
  <p style="font-size:13px;color:#7A7A7A;line-height:1.7;margin:0;">在评论区写下你今天对自己做的一件小事</p>
</section>

<section style="text-align:center;margin:24px 0;">
  <section style="width:30px;height:2px;background:#D9A6A0;margin:0 auto 12px;"></section>
  <p style="font-size:12px;color:#9B9B9B;line-height:1.8;margin:0;">文 / 沫凡<br>原创内容，转载请联系</p>
</section>

</section>
</div>
</body>
</html>
